<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMeet 枢纽站</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0a0a0a; color:#fff;
            font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            padding:1rem;
        }
        .hub { max-width:600px; text-align:center; }
        h1 {
            font-size:3rem; font-weight:600; margin-bottom:1rem;
            background:linear-gradient(135deg, #5f9eff, #9b59b6);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        p { color:#aaa; font-size:1.2rem; margin-bottom:3rem; }
        .button {
            display:inline-block; padding:1.2rem 3rem;
            background:#007aff; color:white; text-decoration:none;
            font-size:1.5rem; font-weight:500; border-radius:60px;
            box-shadow:0 10px 30px rgba(0,122,255,0.3);
            transition:transform 0.2s, background 0.2s;
        }
        .button:hover { background:#005bbf; transform:scale(1.02); }
        .button span { margin-left:10px; font-size:1.8rem; }
        .footer { margin-top:4rem; color:#666; font-size:0.9rem; }
        .footer a { color:#888; text-decoration:none; }
        .footer a:hover { color:#fff; }
    </style>
</head>
<body>
    <div class="hub">
        <h1>EduMeet 枢纽站</h1>
        <p>从这里出发，探索我们的开源无人机与机器狗世界</p>
        <a class="button" href="https://scsloong.github.io/EduMeet-DroneOS/" target="_blank">
            🚁 前往无人机系统 <span>→</span>
        </a>
        <div class="footer">
            <a href="https://github.com/scsloong/EduMeet-DroneOS">GitHub 仓库</a> · 
            <a href="/">返回首页</a>
        </div>
    </div>
</body>
</html>
